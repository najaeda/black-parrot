name: kepler-formal-blackparrot-self-compare

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-compare:
    name: Compare BlackParrot RTL with itself
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout latest repository tree
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout reference repository tree
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: reference
          submodules: recursive

      - name: Prepare BlackParrot RTL flists
        run: |
          bash ci/kepler-formal/prepare-flist.sh . ci/kepler-formal/generated/self-compare.latest.f
          bash ci/kepler-formal/prepare-flist.sh reference ci/kepler-formal/generated/self-compare.reference.f
          cat > ci/kepler-formal/generated/self-compare.yaml <<'EOF'
          format: systemverilog
          sv_design1_flist: ci/kepler-formal/generated/self-compare.latest.f
          sv_design1_top: bp_multicore
          sv_design2_flist: ci/kepler-formal/generated/self-compare.reference.f
          sv_design2_top: bp_multicore
          EOF

      - name: Run kepler-formal BlackParrot comparison
        id: kepler
        uses: najaeda/kepler-formal-action@main
        with:
          config-path: ci/kepler-formal/generated/self-compare.yaml
          artifact-dir: .artifacts/kepler-formal/self-compare

      - name: Upload kepler-formal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kepler-formal-self-compare
          path: ${{ steps.kepler.outputs.artifact-dir }}
          if-no-files-found: warn
